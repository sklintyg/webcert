bootRun {
    systemProperty("spring.profiles.active", "dev,testability-api,caching-enabled,ia-stub,certificate-analytics-service-active")
    systemProperty("spring.config.additional-location", "file:${applicationDir}/config/")
    jvmArgs = [
            "-Djava.awt.headless=true",
            "-Dfile.encoding=UTF-8",
            "-Dapplication.dir=${applicationDir}",
            "-Ddev.http.port=8020",
            "-Ddev.http.port.internal=8120",
            "-Dxml.catalog.cacheEnabled=false"
    ]
}

tasks.register("appRunDebug") {
    println("######## Running in Debug mode ########")
    doFirst {
        bootRun.configure {
            jvmArgs += ["-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=8820"]
        }
    }
    finalizedBy("bootRun")
}

tasks.register("appRun") {
    println("######## Running in normal mode ########")
    finalizedBy("bootRun")
}